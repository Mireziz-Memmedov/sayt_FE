<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="add_listing.js" defer></script>
    <script src="https://kit.fontawesome.com/51d2f8b0de.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Add Listing</title>
</head>

<body id="body_add_listing">

    <header>

    </header>

    <main>
        <div class="section add_listing">
            <div class="container">
                <div class="row">
                    <div class="col-12 d-flex justify-content-center">
                        <div class="form-card">
                            <h2 class="text-center mt-4">Add New Listing</h2>
                            <form id="add-listing-form" class="mt-4">
                                <div class="mb-3">
                                    <label for="make" class="form-label">Make</label>
                                    <select class="form-control" id="make" name="make" required>
                                        <option value="">Select Make</option>
                                        <option>Acura</option>
                                        <option>Alfa Romeo</option>
                                        <option>Aston Martin</option>
                                        <option>Audi</option>
                                        <option>Bentley</option>
                                        <option>BMW</option>
                                        <option>Bugatti</option>
                                        <option>Buick</option>
                                        <option>Cadillac</option>
                                        <option>Chevrolet</option>
                                        <option>Chrysler</option>
                                        <option>Citroen</option>
                                        <option>Cupra</option>
                                        <option>Dacia</option>
                                        <option>Daewoo</option>
                                        <option>Dodge</option>
                                        <option>Ferrari</option>
                                        <option>Fiat</option>
                                        <option>Ford</option>
                                        <option>Genesis</option>
                                        <option>GMC</option>
                                        <option>Great Wall</option>
                                        <option>Honda</option>
                                        <option>Hummer</option>
                                        <option>Hyundai</option>
                                        <option>Infiniti</option>
                                        <option>Isuzu</option>
                                        <option>Jaguar</option>
                                        <option>Jeep</option>
                                        <option>Kia</option>
                                        <option>Lamborghini</option>
                                        <option>Land Rover</option>
                                        <option>Lexus</option>
                                        <option>Lincoln</option>
                                        <option>Maserati</option>
                                        <option>Maybach</option>
                                        <option>Mazda</option>
                                        <option>McLaren</option>
                                        <option>Mercedes-Benz</option>
                                        <option>Mini</option>
                                        <option>Mitsubishi</option>
                                        <option>Nissan</option>
                                        <option>Opel</option>
                                        <option>Peugeot</option>
                                        <option>Pontiac</option>
                                        <option>Porsche</option>
                                        <option>Ram</option>
                                        <option>Renault</option>
                                        <option>Rolls-Royce</option>
                                        <option>Saab</option>
                                        <option>Seat</option>
                                        <option>Skoda</option>
                                        <option>Smart</option>
                                        <option>Subaru</option>
                                        <option>Suzuki</option>
                                        <option>Tesla</option>
                                        <option>Toyota</option>
                                        <option>Volkswagen</option>
                                        <option>Volvo</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="model" class="form-label">Model</label>
                                    <input type="text" class="form-control" id="model" name="model" required>
                                </div>

                                <div class="mb-3">
                                    <label for="year" class="form-label">Year</label>
                                    <select class="form-control" id="year" name="year" required>
                                        <option value="">Select Year</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="body-type" class="form-label">Body Type</label>
                                    <select class="form-control" id="body-type" name="body_type" required>
                                        <option value="">Select Body Type</option>
                                        <option>Sedan</option>
                                        <option>SUV</option>
                                        <option>Hatchback</option>
                                        <option>Coupe</option>
                                        <option>Convertible</option>
                                        <option>Pickup</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="fuel" class="form-label">Fuel Type</label>
                                    <select class="form-control" id="fuel" name="fuel" required>
                                        <option value="">Select Fuel Type</option>
                                        <option>Petrol</option>
                                        <option>Diesel</option>
                                        <option>Hybrid</option>
                                        <option>Electric</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="transmission" class="form-label">Transmission</label>
                                    <select class="form-control" id="transmission" name="transmission" required>
                                        <option value="">Select Transmission</option>
                                        <option>Automatic</option>
                                        <option>Manual</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="engine" class="form-label">Engine (L)</label>
                                    <input type="number" step="0.1" class="form-control" id="engine" name="engine" required>
                                </div>

                                <div class="mb-3">
                                    <label for="mileage" class="form-label">Mileage (km)</label>
                                    <input type="number" class="form-control" id="mileage" name="mileage" required>
                                </div>

                                <div class="mb-3">
                                    <label for="color" class="form-label">Color</label>
                                    <select class="form-control" id="color" name="color" required>
                                        <option value="">Select Color</option>
                                        <option>Black</option>
                                        <option>White</option>
                                        <option>Gray</option>
                                        <option>Silver</option>
                                        <option>Blue</option>
                                        <option>Red</option>
                                        <option>Green</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="price" class="form-label">Price (AZN)</label>
                                    <input type="number" class="form-control" id="price" name="price" required>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" name="description" rows="5"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Photos</label>

                                    <label for="images" id="drop-area">
                                        <p>Drag & Drop or click to upload images</p>
                                    </label>

                                    <input type="file" id="images" multiple hidden>
                                </div>

                                <div id="preview-container"></div>

                                <button type="submit" class="btn btn-primary w-100">
                                    Add Listing
                                </button>

                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
