<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="add_listing.js" defer></script>
    <script src="https://kit.fontawesome.com/51d2f8b0de.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Add Listing</title>
</head>

<body id="body_add_listing">

    <header>

    </header>

    <main>
        <div class="section add_listing">
            <div class="container">
                <div class="row">
                    <div class="col-12 d-flex justify-content-center">
                        <div class="form-card">
                            <h2 class="text-center mt-4">Add New Listing</h2>
                            <form id="add-listing-form" class="mt-4">
                                <div class="mb-3">
                                    <label for="make" class="form-label">Make</label>
                                    <select class="form-control" id="make" name="make" required>
                                        <option value="">Select Make</option>
                                        <option value="Acura">Acura</option>
                                        <option value="Alfa Romeo">Alfa Romeo</option>
                                        <option value="Aston Martin">Aston Martin</option>
                                        <option value="Audi">Audi</option>
                                        <option value="Bentley">Bentley</option>
                                        <option value="BMW">BMW</option>
                                        <option value="Bugatti">Bugatti</option>
                                        <option value="Buick">Buick</option>
                                        <option value="Cadillac">Cadillac</option>
                                        <option value="Chevrolet">Chevrolet</option>
                                        <option value="Chrysler">Chrysler</option>
                                        <option value="Citroen">Citroen</option>
                                        <option value="Cupra">Cupra</option>
                                        <option value="Dacia">Dacia</option>
                                        <option value="Daewoo">Daewoo</option>
                                        <option value="Dodge">Dodge</option>
                                        <option value="Ferrari">Ferrari</option>
                                        <option value="Fiat">Fiat</option>
                                        <option value="Ford">Ford</option>
                                        <option value="Genesis">Genesis</option>
                                        <option value="GMC">GMC</option>
                                        <option value="Great Wall">Great Wall</option>
                                        <option value="Honda">Honda</option>
                                        <option value="Hummer">Hummer</option>
                                        <option value="Hyundai">Hyundai</option>
                                        <option value="Infiniti">Infiniti</option>
                                        <option value="Isuzu">Isuzu</option>
                                        <option value="Jaguar">Jaguar</option>
                                        <option value="Jeep">Jeep</option>
                                        <option value="Kia">Kia</option>
                                        <option value="Lamborghini">Lamborghini</option>
                                        <option value="Land Rover">Land Rover</option>
                                        <option value="Lexus">Lexus</option>
                                        <option value="Lincoln">Lincoln</option>
                                        <option value="Maserati">Maserati</option>
                                        <option value="Maybach">Maybach</option>
                                        <option value="Mazda">Mazda</option>
                                        <option value="McLaren">McLaren</option>
                                        <option value="Mercedes-Benz">Mercedes-Benz</option>
                                        <option value="Mini">Mini</option>
                                        <option value="Mitsubishi">Mitsubishi</option>
                                        <option value="Nissan">Nissan</option>
                                        <option value="Opel">Opel</option>
                                        <option value="Peugeot">Peugeot</option>
                                        <option value="Pontiac">Pontiac</option>
                                        <option value="Porsche">Porsche</option>
                                        <option value="Ram">Ram</option>
                                        <option value="Renault">Renault</option>
                                        <option value="Rolls-Royce">Rolls-Royce</option>
                                        <option value="Saab">Saab</option>
                                        <option value="Seat">Seat</option>
                                        <option value="Skoda">Skoda</option>
                                        <option value="Smart">Smart</option>
                                        <option value="Subaru">Subaru</option>
                                        <option value="Suzuki">Suzuki</option>
                                        <option value="Tesla">Tesla</option>
                                        <option value="Toyota">Toyota</option>
                                        <option value="Volkswagen">Volkswagen</option>
                                        <option value="Volvo">Volvo</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="model" class="form-label">Model</label>
                                    <select class="form-control" id="model" name="model" required>
                                        <option value="">Select Model</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="year" class="form-label">Year</label>
                                    <select class="form-control" id="year" name="year" required>
                                        <option value="">Select Year</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="body-type" class="form-label">Body Type</label>
                                    <select class="form-control" id="body-type" name="body_type" required>
                                        <option value="">Select Body Type</option>
                                        <option>Sedan</option>
                                        <option>SUV</option>
                                        <option>Hatchback</option>
                                        <option>Coupe</option>
                                        <option>Convertible</option>
                                        <option>Pickup</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="fuel" class="form-label">Fuel Type</label>
                                    <select class="form-control" id="fuel" name="fuel" required>
                                        <option value="">Select Fuel Type</option>
                                        <option>Petrol</option>
                                        <option>Diesel</option>
                                        <option>Hybrid</option>
                                        <option>Electric</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="transmission" class="form-label">Transmission</label>
                                    <select class="form-control" id="transmission" name="transmission" required>
                                        <option value="">Select Transmission</option>
                                        <option>Automatic</option>
                                        <option>Manual</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="engine" class="form-label">Engine (L)</label>
                                    <input type="number" step="0.1" class="form-control" id="engine" name="engine"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <label for="mileage" class="form-label">Mileage (km)</label>
                                    <input type="number" class="form-control" id="mileage" name="mileage" required>
                                </div>

                                <div class="mb-3">
                                    <label for="color" class="form-label">Color</label>
                                    <select class="form-control" id="color" name="color" required>
                                        <option value="">Select Color</option>
                                        <option>Black</option>
                                        <option>White</option>
                                        <option>Gray</option>
                                        <option>Silver</option>
                                        <option>Blue</option>
                                        <option>Red</option>
                                        <option>Green</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="price" class="form-label">Price (AZN)</label>
                                    <input type="number" class="form-control" id="price" name="price" required>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" name="description"
                                        rows="5"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Photos</label>

                                    <label for="images" id="drop-area">
                                        <p>Drag & Drop or click to upload images</p>
                                    </label>

                                    <input type="file" id="images" name="images" multiple hidden>
                                </div>

                                <div id="preview-container"></div>

                                <button type="submit" class="btn btn-primary w-100">
                                    Add Listing
                                </button>

                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
