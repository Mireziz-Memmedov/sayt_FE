<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="verify.js" defer></script>
    <script src="https://kit.fontawesome.com/51d2f8b0de.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title data-key="verify">Verify Code</title>
</head>

<body id="verify_body">
    <header>

    </header>

    <main>
        <section id="verify">
            <div class="container">
                <div class="row">
                    <div class="col-md-12 d-flex justify-content-center align-items-center">
                        <div class="box">
                            <div class="back-btn">
                                <a href="signup.html">
                                    <i class="fa-solid fa-arrow-left"></i>
                                </a>
                            </div>
                            <div class="add">
                                <div class="icon">
                                    <i class="fa-solid fa-shield-halved"></i>
                                </div>
                                <h1>Verify Your Code</h1>
                                <p>We've sent 6-digit code to your email.</p>
                                <p>Please enter the code below to continue.</p>
                                <div class="otp">
                                    <input maxlength="1" placeholder="-">
                                    <input maxlength="1" placeholder="-">
                                    <input maxlength="1" placeholder="-">
                                    <input maxlength="1" placeholder="-">
                                    <input maxlength="1" placeholder="-">
                                    <input maxlength="1" placeholder="-">
                                </div>
                            </div>
                            <div class="minibox d-flex justify-content-center">
                                <p>Didn't receive the code?</p>
                                <a href="#">Resend code</a>
                            </div>
                            <p id="error-msg" style="color:red; font-weight:bold;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>

    </footer>
</body>

</html>
