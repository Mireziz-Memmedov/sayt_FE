<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="dashboard.js" defer></script>
    <script src="https://kit.fontawesome.com/51d2f8b0de.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>

<body id="body_dashboard">
    <header id="dashboard-header">
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <div class="menu d-flex justify-content-between align-items-center">
                        <div class="box">
                            <div class="icon">
                                <i class="fa-solid fa-car"></i>
                            </div>
                            <h2>AutoMarket</h2>
                        </div>
                        <div class="user-info">
                            <div class="user-item">
                                <span class="label">Username:</span>
                                <span class="username">
                                    <!-- JavaScript kodunda localStorage-dan username-i alıb bu span-in içinə yazacağıq -->
                                </span>
                            </div>
                            <div class="user-item">
                                <span class="label">Email:</span>
                                <span class="email">
                                    <!-- JavaScript kodunda localStorage-dan email-i alıb bu span-in içinə yazacağıq -->
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="dashboard-section">
            <div class="container">
                <div class="row">
                    <div class="col-12">
                        <div class="dashboard-box">
                            <div class="home">
                                <div class="icon">
                                    <i class="fa-solid fa-house"></i>
                                    <h2>Home</h2>
                                </div>
                            </div>
                            <div class="listings">
                                <div class="icon">
                                    <i class="fa-solid fa-list"></i>
                                    <h2>Listings</h2>
                                </div>
                            </div>
                            <div class="profile">
                                <div class="icon">
                                    <i class="fa-solid fa-user"></i>
                                    <h2>Profile</h2>
                                </div>
                            </div>
                            <div class="messages">
                                <div class="icon">
                                    <i class="fa-solid fa-message"></i>
                                    <h2>Messages</h2>
                                </div>
                            </div>
                            <div class="favorites">
                                <div class="icon">
                                    <i class="fa-solid fa-heart"></i>
                                    <h2>Favorites</h2>
                                </div>
                            </div>
                            <div class="settings">
                                <div class="icon">
                                    <i class="fa-solid fa-gear"></i>
                                    <h2>Settings</h2>
                                </div>
                            </div>
                            <div class="logout">
                                <div class="icon">
                                    <i class="fa-solid fa-right-from-bracket"></i>
                                    <h2>Logout</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>

    </footer>
</body>

</html>
